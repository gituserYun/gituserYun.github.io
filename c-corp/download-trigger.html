        // === 로컬 파일 생성 및 다운로드 ===
        function createAndDownloadPNG() {
            // Canvas로 Test PNG 이미지 생성
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 200;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(0, 0, 200, 200);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('CSRF Attack', 100, 90);
            ctx.fillText('Download Trigger', 100, 120);
            
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'download-trigger.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
              
                document.getElementById('status').innerHTML = 
                    '✓ 파일이 다운로드되었습니다.<br>' +
                    '<small style="color: #ffeb3b;">실제 공격에서는 악성 파일일 수 있습니다.</small>';
            }, 'image/png');
        }

        // 페이지 로드 후 자동 실행
        window.addEventListener('load', function() {
            setTimeout(function() {
                createAndDownloadPNG();
            }, 2000); 
        });

    </script>
