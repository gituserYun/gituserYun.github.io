<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=1280, height=720, initial-scale=1.0" name="viewport"/>
<title>Kerberos 인증 취약점 연구</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0f172a; /* Dark Slate Blue/Gray base */
            color: #ffffff;
        }
        
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url("https://page.gensparksite.com/slides_images/fbff425ce6e3101cd04d302b42e23d2f.webp");
            background-size: cover;
            background-position: center;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85); /* Dark overlay for readability */
            z-index: 1;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        
        .logo-area {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .security-icon {
            font-size: 3.5rem;
            color: #3b82f6; /* Blue-500 */
            margin-right: 1rem;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        
        .title-divider {
            width: 120px;
            height: 4px;
            background-color: #3b82f6;
            margin: 2rem auto;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.7);
        }
        
        .main-title {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            background-clip: text;
            -webkit-background-clip: text;
        }
        
        .subtitle {
            font-size: 2rem;
            font-weight: 400;
            color: #e2e8f0; /* Slate-200 */
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }
        
        .presenter-info {
            margin-top: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(30, 41, 59, 0.6);
            padding: 1.5rem 3rem;
            border-radius: 1rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
            backdrop-filter: blur(5px);
        }
        
        .presenter-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }
        
        .presenter-detail {
            font-size: 1.1rem;
            color: #94a3b8; /* Slate-400 */
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .date-badge {
            background-color: #1e3a8a;
            color: #bfdbfe;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .grid-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            opacity: 0.3;
        }
        
        .hex-decoration {
            position: absolute;
            z-index: 1;
            opacity: 0.1;
        }
        
        .hex-1 {
            top: 10%;
            left: 5%;
            font-size: 15rem;
            color: #3b82f6;
        }
        
        .hex-2 {
            bottom: 10%;
            right: 5%;
            font-size: 20rem;
            color: #3b82f6;
        }

        /* Glitch effect for cybersecurity feel */
        .glitch-wrapper {
            position: relative;
        }
        
        .security-badge {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 10;
            background-color: rgba(15, 23, 42, 0.8);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border-left: 3px solid #ef4444; /* Red for alert/vulnerability */
        }
        
        .security-badge-text {
            font-size: 0.8rem;
            font-weight: 700;
            color: #ef4444;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Background Elements -->
<div class="overlay"></div>
<div class="grid-pattern"></div>
<i class="fas fa-shield-halved hex-decoration hex-1"></i>
<i class="fas fa-network-wired hex-decoration hex-2"></i>
<!-- Top Right Badge -->
<div class="security-badge">
<i class="fas fa-bug text-red-500"></i>
<span class="security-badge-text">VULNERABILITY RESEARCH</span>
</div>
<!-- Main Content -->
<div class="content-wrapper">
<div class="logo-area">
<i class="fas fa-user-secret security-icon"></i>
<div class="text-left ml-4">
<p class="text-blue-400 font-bold tracking-widest text-sm uppercase">Security Workshop</p>
<p class="text-white font-bold text-xl">Kerberos Protocol Analysis</p>
</div>
</div>
<div class="glitch-wrapper">
<h1 class="main-title">Kerberos 인증<br/>취약점 연구</h1>
</div>
<div class="title-divider"></div>
<h2 class="subtitle">보안 워크샵 발표자료</h2>
<div class="presenter-info">
<p class="presenter-name">김정민, 이태윤 주임</p>
<div class="presenter-detail">
<span><i class="fas fa-building mr-2"></i>(주)위드시큐리티</span>
<span class="text-slate-600">|</span>
<span><i class="fas fa-envelope mr-2"></i>jmkim@withsecurity.co.kr</span>
<span class="text-slate-600">|</span>
<span><i class="fas fa-envelope mr-2"></i>tylee@withsecurity.co.kr</span>
</div>
<div class="date-badge">
<i class="far fa-calendar-alt mr-2"></i>2026년 2월
                </div>
</div>
</div>
</div>
</body>
</html>
